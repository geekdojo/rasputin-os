name: release

# Cross-compile + ship (locked CI v1 posture — no QEMU/hardware boot-test
# yet). See os-images/release-pipeline.md.
#
# SCAFFOLD GATE: this repo is a scaffold. The full Buildroot image build
# cannot succeed yet — the defconfigs carry starter kernel/BSP options and
# the package .mk files need a matching control-plane release to download
# (see README "Status"). So the heavy `build` job runs ONLY on a release
# tag or an explicit opt-in dispatch; every push gets the cheap `validate`
# job instead, so the repo isn't perpetually red while it's a scaffold.
#
# Triggers:
#   - push of a CalVer tag (e.g. 2026.06.0)  → validate + build + release
#   - manual dispatch (full_build=false)     → validate only
#   - manual dispatch (full_build=true)      → validate + build (no release)

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*"
  workflow_dispatch:
    inputs:
      full_build:
        description: "Attempt the full Buildroot build (needs real BSP defconfigs + a published control-plane release; will fail until then)"
        type: boolean
        default: false

permissions:
  contents: write   # create releases + upload assets

env:
  # Node 20 is EOL on GitHub runners (forced off by June 2026). Opt the JS
  # actions (checkout, cache, upload/download-artifact) into Node 24 now —
  # clears the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Always-on, fast, deterministic. Confirms the external tree is structurally
  # sane without a multi-hour Buildroot run. Green at the scaffold stage.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell script syntax
        run: |
          set -e
          for f in scripts/*.sh \
                   board/rasputin/common/*.sh \
                   board/rasputin/common/rootfs-overlay/usr/lib/rasputin/*/*.sh; do
            echo "bash -n $f"; bash -n "$f"
          done
      - name: External tree structure
        run: |
          set -e
          req="external.desc external.mk Config.in
               configs/rasputin_cm5_defconfig configs/rasputin_n100_defconfig
               package/rasputin-agent/rasputin-agent.mk
               package/rasputin-api/rasputin-api.mk
               board/rasputin/cm5/genimage.cfg
               board/rasputin/n100/genimage.cfg
               board/rasputin/common/post-image.sh"
          for f in $req; do
            test -f "$f" && echo "ok  $f" || { echo "MISSING $f" >&2; exit 1; }
          done
          grep -q '^name: RASPUTIN' external.desc
          echo "external tree structure OK"

  build:
    needs: validate
    # Scaffold gate — see the header comment.
    # full_build arrives as a real boolean from the UI checkbox but as the
    # STRING "true" via the API / `gh -f`. Accept both. (Defaults to false
    # if the input wasn't set at all.)
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (inputs.full_build == true || inputs.full_build == 'true')) }}
    runs-on: ubuntu-latest   # amd64; Buildroot cross-compiles arm64 fine
    strategy:
      fail-fast: false
      matrix:
        # v1 scope (revised 2026-06-23): CM5/arm64 is back IN scope for compute
        # + controlplane nodes (decision #4 re-opened — some design partners
        # only have Raspberry Pis, so the cluster must support arm64 from the
        # start; firewall stays N100-only). The control-plane/UI side already
        # serves a per-arch image (Add-node arch picker → /api/cluster/node-image
        # ?arch=).
        #
        # The cm5 build is STILL commented out here, deliberately: the cm5 image
        # compiles green but is currently a NON-BOOTABLE scaffold — board/cm5/
        # genimage.cfg's boot FAT carries no kernel Image / CM5 DTB / Pi firmware
        # blob set, and the defconfig DTS + firmware variant still carry
        # BRING-UP markers. Uncommenting it now would publish a brick to the
        # public release channel that the wizard's ARM64 option would hand to a
        # Pi tester. Flip it back on only after the CM5 hardware bring-up lands
        # AND the arm64 .img is boot-verified on a real CM5 (there's no CI boot
        # smoke for arm64 — a Pi can't be emulated end-to-end here). Bring-up
        # tasks tracked in the wiki backlog (os-images CM5/arm64 parity).
        include:
          # - sku: cm5
          #   defconfig: rasputin_cm5_defconfig
          #   arch: arm64
          #   compatible: rasputin-pi5-cm5
          - sku: n100
            defconfig: rasputin_n100_defconfig
            arch: amd64
            compatible: rasputin-n100
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # Buildroot is added by the init script (pinned)

      - name: Compute version (CalVer)
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            # `-dev` suffix in the tag → dev channel (e.g. 2026.06.0-dev.1).
            # Plain CalVer (e.g. 2026.06.0) → stable.
            case "${GITHUB_REF_NAME}" in
              *-dev*) echo "channel=dev"    >> "$GITHUB_OUTPUT" ;;
              *)      echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "version=$(date -u +%Y.%m.0)-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Init Buildroot (pinned LTS)
        run: ./scripts/init-buildroot.sh

      # Restore the Buildroot download dir + ccache. Warm ccache: kernel +
      # packages recompile in minutes vs ~2-3 h cold. (release-pipeline.md §6)
      #
      # SPLIT restore/save (not the one-shot actions/cache): the unified action
      # only saves on job SUCCESS, so a build that fails mid-bring-up would
      # never warm the cache and every retry stays cold. The discrete save
      # step below runs with `if: always()`.
      #
      # ccache lives at the default $HOME/.buildroot-ccache (BR2_CCACHE=y, no
      # dir override needed). dl is workspace-relative (BR2_DL_DIR).
      - name: Restore Buildroot dl + ccache
        id: brcache
        uses: actions/cache/restore@v4
        with:
          path: |
            dl
            ~/.buildroot-ccache
          # Key on real, checked-in files: the defconfig + the init script
          # (which pins the Buildroot tag). Both exist at checkout time.
          # NOT buildroot/.git/HEAD — that's a submodule gitlink file, not a
          # hashable path, and breaks hashFiles ("template is not valid").
          key: br-${{ matrix.sku }}-${{ hashFiles(format('configs/{0}', matrix.defconfig), 'scripts/init-buildroot.sh') }}
          restore-keys: br-${{ matrix.sku }}-

      - name: Inject trust root
        run: |
          # CI injects the PUBLIC root CA cert (not a secret) into the rootfs
          # overlay before the build. The signing LEAF key is applied later,
          # in a discrete step, never in the build job.
          echo "${{ vars.RASPUTIN_ROOT_CA_PEM }}" \
            > board/rasputin/common/rootfs-overlay/etc/rasputin/trust/root-ca.pem

      # Buildroot (toolchain + kernel + Docker + rootfs) easily overflows the
      # ~14 GB free on a stock hosted runner — that overflow is the likely
      # cause of a Build step dying mid-compile with a truncated log. Reclaim
      # the preinstalled toolchains we don't need (~25-30 GB).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      # The agent/api binaries live in a PRIVATE control-plane release, so
      # Buildroot's anonymous downloader gets a 404. Pre-place the tarballs
      # into Buildroot's dl/ cache here, authenticated with a fine-grained
      # PAT (Contents:read on geekdojo/rasputin-control-plane). With no .hash
      # file present, Buildroot's dl-wrapper finds the cached file and skips
      # the network fetch entirely. See os-images/release-pipeline.md §1
      # ("Fetching the vendored agent/api binaries").
      - name: Fetch vendored binaries (private control-plane release)
        env:
          GH_TOKEN: ${{ secrets.CONTROL_PLANE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'        # amd64 (n100) | arm64 (cm5)
          dl='${{ github.workspace }}/dl'
          fetch() {
            pkg=$1
            var=$(printf '%s' "$pkg" | tr 'a-z-' 'A-Z_')   # rasputin-agent → RASPUTIN_AGENT
            ver=$(sed -n "s/^${var}_VERSION = //p" "package/$pkg/$pkg.mk" | tr -d '[:space:]')
            test -n "$ver" || { echo "::error::could not parse ${var}_VERSION from package/$pkg/$pkg.mk"; exit 1; }
            src="$pkg-$ver-linux-$arch.tar.gz"
            mkdir -p "$dl/$pkg"
            echo "→ fetching $src into dl/$pkg/"
            gh release download "v$ver" \
              --repo geekdojo/rasputin-control-plane \
              --pattern "$src" \
              --dir "$dl/$pkg" \
              --clobber
          }
          fetch rasputin-agent
          fetch rasputin-api
          echo "----- dl/ tarballs -----"; find "$dl" -name '*.tar.gz' -print

      # Pre-pull + save the mesh container images (self-hosted Headscale) for
      # the target arch so post-build.sh can bake them into the rootfs. The
      # controlplane then forms its mesh on first boot WITHOUT internet (the
      # supervisor's `docker image inspect` finds the loaded image and skips the
      # pull). --platform so the cm5 (arm64) image is fetched correctly on this
      # amd64 runner — we only `docker save` it here, never run it. Refs come
      # from board/rasputin/common/mesh-images.list (single source; must match
      # the api's defaultImage). See os-images/buildroot-os.md §8.
      - name: Bake mesh container images
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'          # amd64 (n100) | arm64 (cm5)
          list='${{ github.workspace }}/board/rasputin/common/mesh-images.list'
          out='${{ github.workspace }}/mesh-images'
          mkdir -p "$out"
          grep -vE '^[[:space:]]*(#|$)' "$list" | while read -r ref; do
            ref="$(printf '%s' "$ref" | tr -d '[:space:]')"
            [ -n "$ref" ] || continue
            file="$(printf '%s' "$ref" | tr '/:' '__').tar"
            echo "→ pulling $ref (linux/$arch) → $file"
            docker pull --platform "linux/$arch" "$ref"
            docker save "$ref" -o "$out/$file"
          done
          echo "----- baked mesh image tarballs -----"; ls -lh "$out"

      - name: Build
        env:
          RASPUTIN_VERSION: ${{ steps.ver.outputs.version }}
          BR2_DL_DIR: ${{ github.workspace }}/dl
          # Baked into /root/.ssh/authorized_keys by post-build.sh for key-only
          # SSH. Same org/repo variable the firewall image uses. Empty → no
          # network SSH (console only); set it for a key-only image.
          RASPUTIN_SSH_AUTHORIZED_KEY: ${{ vars.RASPUTIN_SSH_AUTHORIZED_KEY }}
          # Mesh image tarballs from the "Bake mesh container images" step;
          # post-build.sh copies them into /usr/share/rasputin/mesh-images.
          RASPUTIN_MESH_IMAGES_DIR: ${{ github.workspace }}/mesh-images
        run: |
          make -C buildroot BR2_EXTERNAL=${{ github.workspace }} \
            O=${{ github.workspace }}/output/${{ matrix.sku }} \
            ${{ matrix.defconfig }}
          make -C buildroot BR2_EXTERNAL=${{ github.workspace }} \
            O=${{ github.workspace }}/output/${{ matrix.sku }}

      # Save even when Build fails (if: always) so the next bring-up iteration
      # gets a warm ccache. Skip when restore was an exact key hit (nothing
      # new to store under that key). See the Restore step's rationale.
      - name: Save Buildroot dl + ccache
        if: always() && steps.brcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            dl
            ~/.buildroot-ccache
          key: br-${{ matrix.sku }}-${{ hashFiles(format('configs/{0}', matrix.defconfig), 'scripts/init-buildroot.sh') }}

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sku }}-${{ steps.ver.outputs.version }}
          path: |
            output/${{ matrix.sku }}/images/*.img
            output/${{ matrix.sku }}/images/bundle/rootfs.img
            output/${{ matrix.sku }}/images/bundle/manifest.raucm
          # post-image.sh no longer produces a .raucb in the build job —
          # the leaf signing key never enters the build runner. The bundle/
          # contents above are what sign-and-release feeds to `rauc bundle`.

  # Boot-smoke the amd64 image in QEMU — the relaxation of "no boot test in
  # CI" that needs NO hardware (the N100 is generic x86_64; a generic UEFI
  # image boots in QEMU and on the real board alike). Catches boot/rootfs/
  # RAUC regressions automatically. The arm64/CM5 image can't be fully
  # smoke-tested here (Pi firmware + tryboot need a real Pi) — that stays
  # manual on hardware.
  #
  # TODO(bring-up): tune two things on the first green build —
  #   (a) the kernel cmdline needs `console=ttyS0,115200` so systemd logs to
  #       the serial QEMU captures (wire it in the GRUB cfg / genimage);
  #   (b) confirm the success marker string below matches the boot output.
  smoke-amd64:
    needs: build
    # Run as long as the workflow wasn't cancelled — !cancelled() decouples
    # smoke from cm5: with `fail-fast: false`, needs.build.result is 'failure'
    # if ANY matrix entry failed, which would otherwise skip smoke when n100
    # built fine but cm5 didn't (cm5 is hardware bring-up; it shouldn't block
    # amd64 QEMU validation). If n100 also failed, the artifact-download step
    # below surfaces that cleanly.
    #
    # full_build arrives as a real boolean from the UI checkbox but as the
    # STRING "true" via the API / `gh -f`. Accept both. (Defaults to false
    # if the input wasn't set at all.)
    if: ${{ !cancelled() && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (inputs.full_build == true || inputs.full_build == 'true'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Install QEMU + OVMF (UEFI firmware) + mtools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf mtools
      - uses: actions/download-artifact@v4
        with:
          pattern: n100-*
          merge-multiple: true
          path: img
      - name: Boot headless, wait for multi-user.target
        run: |
          set -x
          IMG=$(ls img/*.img | head -1)
          test -n "$IMG" || { echo "no n100 .img artifact"; exit 1; }
          # Seed role=controlplane into the ESP so this boot also brings up
          # rasputin-api and we can assert the API + bundled web UI actually
          # serve (the shipped seed is blank → role-less boot would never
          # start the api). mtools at the fixed genimage ESP offset (LBA 34
          # = byte 17408); editing via a loop mount would also work on Linux
          # but mtools keeps the recipe identical to the macOS bench one.
          printf 'RASPUTIN_NODE_ROLE=controlplane\nRASPUTIN_NATS_URL=\nRASPUTIN_CP_JOIN_TOKEN=\n' > /tmp/seed-cp.env
          mcopy -o -i "$IMG"@@17408 /tmp/seed-cp.env ::rasputin-seed.env
          # Ubuntu's ovmf package renamed the firmware files (the un-suffixed
          # OVMF_CODE.fd / OVMF_VARS.fd are gone on 24.04+; the 4M variants
          # are the modern names, and the secboot ones require signed
          # bootloaders which our GRUB isn't). Pick whichever non-secboot
          # variant is installed.
          OVMF_CODE=$(ls /usr/share/OVMF/OVMF_CODE*.fd 2>/dev/null | grep -v secboot | head -1)
          OVMF_VARS=$(ls /usr/share/OVMF/OVMF_VARS*.fd 2>/dev/null | grep -v secboot | head -1)
          if [ -z "$OVMF_CODE" ] || [ -z "$OVMF_VARS" ]; then
            echo "::error::OVMF firmware not found"; ls -la /usr/share/OVMF/ || true; exit 1
          fi
          echo "using OVMF code=$OVMF_CODE vars=$OVMF_VARS"
          cp "$OVMF_VARS" /tmp/vars.fd
          # -cpu max: advertise every ISA extension QEMU's TCG knows. The
          # image is built with BR2_x86_corei7 (Nehalem baseline → SSE4.2);
          # the default qemu64 CPU model lacks SSE4.2 so glibc's dynamic
          # linker hits "invalid opcode" the moment init runs. Real N100
          # hardware has SSE4.2+ so the build target is correct — this
          # only affects emulation. (max works without KVM, which not all
          # GH runners expose at /dev/kvm.)
          # user-mode NIC with a host forward so the runner can curl the
          # api/UI; virtio-net matches the virtio-blk the image already
          # boots from. The api listens on :80 now (HTTP bootstrap surface;
          # RASPUTIN_HTTP_ADDR=:80 in rasputin-api.service — the old :8080
          # default is gone from the image). /healthz stays plain-HTTP by
          # contract. HTTPS (:443) and mDNS are NOT asserted here: user-mode
          # networking makes multicast useless, and the self-signed-cert
          # handshake adds nothing healthz doesn't already prove.
          # timeout stretched 300→900: this boot now also has
          # to start the api (NATS + sqlite + docker units) under TCG, and
          # the poll budgets below (240s multi-user + 120s firstboot +
          # 240s api/UI) must all fit inside it.
          ( timeout 900 qemu-system-x86_64 \
              -machine q35 -m 2048 -smp 2 -cpu max -nographic \
              -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
              -drive if=pflash,format=raw,file=/tmp/vars.fd \
              -drive file="$IMG",format=raw,if=virtio \
              -nic user,model=virtio-net-pci,hostfwd=tcp:127.0.0.1:18080-:80 \
              -serial mon:stdio > /tmp/console.log 2>&1 ) &
          QPID=$!
          ok=0
          for _ in $(seq 1 120); do
            if grep -qE "Reached target .*Multi-User|Welcome to Rasputin" /tmp/console.log; then ok=1; break; fi
            sleep 2
          done
          # Do NOT kill qemu yet: the getty prompt races firstboot (parallel
          # multi-user jobs; firstboot waits on makefs→mount of the persistent
          # partition and finishes a few seconds AFTER the login prompt).
          # dev.2 false-failed by asserting the instant multi-user showed.
          # Keep the same boot running and poll — a second boot can't work,
          # firstboot is guarded by the .provisioned stamp it just wrote.
          fb=0
          if [ "$ok" = 1 ]; then
            for _ in $(seq 1 60); do
              if grep -q "rasputin-firstboot: provisioning complete" /tmp/console.log; then fb=1; break; fi
              sleep 2
            done
          fi
          # API + web UI smoke (same boot, via the hostfwd to guest :80):
          # the seed above made this a controlplane, so rasputin-api must
          # come up and answer /healthz over plain HTTP on :80 (that stays
          # the contract even after the HTTPS listener lands). GET / on :80
          # passes as either the bundled UI HTML (api 0.3.x, HTTP-only) or
          # a redirect to the HTTPS origin (api with native TLS treats :80
          # as a bootstrap/redirect surface) — accept both so the smoke
          # doesn't break across the api's HTTPS rollout.
          # Validated locally 2026-06-11: api answers within ~30s of
          # multi-user under TCG; budget 240s for slower runners.
          api=0 ui=0
          if [ "$fb" = 1 ]; then
            for _ in $(seq 1 48); do
              if [ "$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://127.0.0.1:18080/healthz || true)" = "200" ]; then api=1; break; fi
              sleep 5
            done
            if [ "$api" = 1 ]; then
              rcode=$(curl -s -o /tmp/root.body -w '%{http_code}' --max-time 5 http://127.0.0.1:18080/ || true)
              root=$(cat /tmp/root.body 2>/dev/null || true)
              case "$root" in *"<html"*|*"<!DOCTYPE"*) ui=1;; esac
              case "$rcode" in 301|302|307|308) ui=1;; esac
            fi
          fi
          # Uptime soak: retry-until-success probes are blind to a crash
          # loop (the api's missing sd_notify watchdog support meant every
          # hardware boot SIGABRT-cycled it every ~33s for FIVE releases,
          # and this smoke passed every time — found 2026-06-12 on the Mu
          # bench). 70s straddles two 30s watchdog windows: if any unit is
          # being watchdog-killed, healthz at the end fails and/or the
          # console shows the kill. Both are asserted after shutdown below.
          # Probe CONTINUOUSLY (every 2s for 70s, every probe must pass):
          # a single end-of-window probe would land inside a crash loop's
          # ~28s live window ~85% of the time — the exact blindness that
          # let the bug ship. A 33s kill cycle has a 4-5s dead window that
          # 2s-interval probes cannot miss.
          soak=0
          if [ "$api" = 1 ]; then
            soak=1
            for _ in $(seq 1 35); do
              sleep 2
              [ "$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://127.0.0.1:18080/healthz || true)" = "200" ] \
                || { soak=0; break; }
            done
          fi
          kill "$QPID" 2>/dev/null || true
          echo "----- last 60 lines of console -----"; tail -60 /tmp/console.log || true
          [ "$ok" = 1 ] || { echo "::error::image did not reach multi-user in QEMU"; exit 1; }
          echo "amd64 image booted to multi-user in QEMU"
          # firstboot logs to /dev/kmsg, so its lines reach the serial console.
          # (Asserting on systemd's own "Mounted ..." line doesn't work: PID 1
          # stops mirroring unit status to the console once journald is up,
          # which is before the seed device is found — learned on dev.1.)
          grep -q "rasputin-firstboot: reading seed /run/rasputin-seed/rasputin-seed.env" /tmp/console.log \
            || { echo "::error::firstboot never read the seed — /run/rasputin-seed wiring (or kmsg logging) regressed"; exit 1; }
          # "provisioning complete" proves the persistent partition mounted
          # (makefs+growfs path) and node.env was written — a fresh board
          # otherwise fails provisioning on read-only /etc (Mu bring-up
          # 2026-06-09).
          [ "$fb" = 1 ] \
            || { echo "::error::firstboot did not complete — persistent mount (e2fsprogs/makefs?) or node.env write failed; see console artifact"; exit 1; }
          echo "seed read + provisioning completion confirmed in boot output"
          # Per-role hostname: rasputin-hostname.service runs every boot
          # (after firstboot, before the api) and logs to kmsg like firstboot
          # does. On this controlplane-seeded boot it must have promoted the
          # baked "rasputin-node" placeholder to "rasputin" — that transient
          # hostname is what resolved announces as rasputin.local (mDNS
          # itself can't be asserted under user-mode networking).
          grep -q "rasputin-hostname: transient hostname set to rasputin (role=controlplane)" /tmp/console.log \
            || { echo "::error::rasputin-hostname.service did not set the controlplane hostname — mDNS rasputin.local would be broken; see console artifact"; exit 1; }
          echo "per-role hostname (rasputin) confirmed in boot output"
          [ "$api" = 1 ] \
            || { echo "::error::rasputin-api never answered /healthz on :80 on the controlplane boot — unit failed to start, RASPUTIN_HTTP_ADDR regressed, or networking broke; see console artifact"; exit 1; }
          [ "$ui" = 1 ] \
            || { echo "::error::GET / on :80 returned neither the web UI nor an HTTPS redirect — RASPUTIN_UI_DIR contents missing from the api tarball or the bootstrap surface regressed"; exit 1; }
          [ "$soak" = 1 ] \
            || { echo "::error::api did not survive the 70s uptime soak — watchdog kill loop or crash; check console for 'Watchdog timeout' / SIGABRT"; exit 1; }
          if grep -q "Watchdog timeout" /tmp/console.log; then
            echo "::error::systemd watchdog killed a rasputin unit during the smoke — sd_notify petting regressed (see the v0.4.3 sdnotify package)"; exit 1
          fi
          echo "api healthz + web UI + 70s uptime soak confirmed over hostfwd"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-amd64-console
          path: /tmp/console.log

  # Discrete signing + publish job — the leaf key (encrypted secret) is
  # scoped to HERE and nowhere else. Materialised onto an in-memory tmpfs
  # for the duration of `rauc bundle`, then wiped. (release-pipeline.md §3)
  #
  # Only on a CalVer tag push. To exercise this path before a real release
  # cut, push a `-dev.N` suffixed tag (e.g. 2026.05.0-dev.1) — same shape,
  # marked as prerelease.
  sign-and-release:
    needs: [build, smoke-amd64]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version (CalVer, same logic as build)
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "$VERSION" in
            *-dev*) CHANNEL=dev    ; PRERELEASE=true  ;;
            *)      CHANNEL=stable ; PRERELEASE=false ;;
          esac
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Install rauc + xz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rauc xz-utils

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Layout artifacts (one dir per SKU)
        run: |
          set -eu
          ls -R artifacts/ | head -40
          # The build job named each artifact "<sku>-<version>". We get one
          # subdir per SKU containing: <sku>-<version>.img + bundle/{rootfs.img,manifest.raucm}.
          for d in artifacts/*-${{ steps.ver.outputs.version }}; do
            sku=$(basename "$d" | sed "s/-${{ steps.ver.outputs.version }}\$//")
            echo "::group::SKU $sku"
            ls -la "$d" "$d/bundle" 2>/dev/null || true
            echo "::endgroup::"
          done

      - name: Materialise signing material to tmpfs
        id: mat
        env:
          LEAF_KEY:  ${{ secrets.RASPUTIN_LEAF_KEY }}
          LEAF_CERT: ${{ secrets.RASPUTIN_LEAF_CERT }}
          ROOT_PEM:  ${{ vars.RASPUTIN_ROOT_CA_PEM }}
        run: |
          set -eu
          if [ -z "${LEAF_KEY:-}" ] || [ -z "${LEAF_CERT:-}" ] || [ -z "${ROOT_PEM:-}" ]; then
            echo "::error::missing one of RASPUTIN_LEAF_KEY / RASPUTIN_LEAF_CERT (repo secrets) or RASPUTIN_ROOT_CA_PEM (org variable)"; exit 1
          fi
          sudo mkdir -p /mnt/rasputin-sign
          sudo mount -t tmpfs -o size=8M,mode=0700,uid=$(id -u),gid=$(id -g) tmpfs /mnt/rasputin-sign
          umask 077
          printf '%s' "$LEAF_KEY"  > /mnt/rasputin-sign/leaf.key
          printf '%s' "$LEAF_CERT" > /mnt/rasputin-sign/leaf-chain.pem
          printf '%s' "$ROOT_PEM"  > /mnt/rasputin-sign/root-ca.pem
          # Split leaf-chain.pem into separate leaf.pem + intermediate.pem.
          # rauc only embeds the FIRST cert from --cert into the CMS signature;
          # the intermediate must be passed explicitly via `--intermediate` so
          # the device-side rauc can build leaf → intermediate → root from
          # the bundle alone (with just root in the device trust store).
          awk -v leaf=/mnt/rasputin-sign/leaf.pem \
              -v inter=/mnt/rasputin-sign/intermediate.pem \
              '/-----BEGIN CERTIFICATE-----/{i++} {if(i==1)print > leaf; else if(i==2)print > inter}' \
              /mnt/rasputin-sign/leaf-chain.pem
          # Sanity-check the chain locally before signing anything with it.
          openssl verify -CAfile /mnt/rasputin-sign/root-ca.pem \
            -untrusted /mnt/rasputin-sign/intermediate.pem \
            /mnt/rasputin-sign/leaf.pem \
            || { echo "::error::leaf cert chain does not verify against root"; exit 1; }
          echo "tmpfs=/mnt/rasputin-sign" >> "$GITHUB_OUTPUT"

      - name: Sign .raucb bundles + compress .img + collect metadata
        id: sign
        run: |
          set -eu
          mkdir -p release-out
          : > /tmp/manifest-artifacts.jsonl
          for d in artifacts/*-${{ steps.ver.outputs.version }}; do
            sku=$(basename "$d" | sed "s/-${{ steps.ver.outputs.version }}\$//")
            ver="${{ steps.ver.outputs.version }}"

            # Derive arch/compatible from the manifest.raucm the build wrote
            # (matches what's baked into the bundle — single source of truth).
            compatible=$(awk -F'=' '/^compatible=/{print $2}' "$d/bundle/manifest.raucm")
            case "$sku" in n100) arch=amd64 ;; cm5) arch=arm64 ;; esac

            echo "::group::Sign $sku (compatible=$compatible)"
            rauc bundle \
              --cert="/mnt/rasputin-sign/leaf.pem" \
              --intermediate="/mnt/rasputin-sign/intermediate.pem" \
              --key="/mnt/rasputin-sign/leaf.key" \
              --signing-keyring="/mnt/rasputin-sign/root-ca.pem" \
              "$d/bundle" \
              "release-out/rasputin-os-${sku}-${ver}.raucb"

            # Compress the flashable .img (GH release asset limit is 2 GB;
            # our raw .img is ~3 GB so this is mandatory, not just an
            # optimization).
            img_src=$(ls "$d"/*.img | head -1)
            xz --keep --threads=0 -T0 -c "$img_src" > "release-out/$(basename "$img_src").xz"
            echo "::endgroup::"

            raucb="release-out/rasputin-os-${sku}-${ver}.raucb"
            imgxz="release-out/$(basename "$img_src").xz"
            raucb_sha=$(sha256sum "$raucb"  | awk '{print $1}')
            imgxz_sha=$(sha256sum "$imgxz"  | awk '{print $1}')
            raucb_sz=$(stat -c%s "$raucb")
            imgxz_sz=$(stat -c%s "$imgxz")
            built=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            jq -nc \
              --arg sku "$sku" --arg arch "$arch" --arg compatible "$compatible" \
              --arg raucb   "$(basename "$raucb")"  --arg raucb_sha "$raucb_sha" \
              --arg image   "$(basename "$imgxz")"  --arg imgxz_sha "$imgxz_sha" \
              --argjson raucb_sz "$raucb_sz" --argjson imgxz_sz "$imgxz_sz" \
              --arg signedBy "Rasputin Release ${ver}" --arg built "$built" \
              '{sku:$sku, architecture:$arch, compatible:$compatible,
                raucb:$raucb, sha256:$raucb_sha, sizeBytes:$raucb_sz,
                image:$image, imageSha256:$imgxz_sha, imageSizeBytes:$imgxz_sz,
                signedBy:$signedBy, buildDate:$built}' \
              >> /tmp/manifest-artifacts.jsonl
          done

          jq -n \
            --arg version "${{ steps.ver.outputs.version }}" \
            --arg channel "${{ steps.ver.outputs.channel }}" \
            --slurpfile artifacts /tmp/manifest-artifacts.jsonl \
            '{version:$version, channel:$channel, artifacts:$artifacts}' \
            > release-out/manifest.json
          echo "----- release-out/ -----" && ls -lh release-out/ && \
            echo "----- manifest.json -----" && cat release-out/manifest.json

      - name: Wipe signing material
        if: always()
        run: sudo umount /mnt/rasputin-sign 2>/dev/null || true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          PRERELEASE_FLAG=""
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "Rasputin OS ${{ steps.ver.outputs.version }}" \
            --notes "Channel: \`${{ steps.ver.outputs.channel }}\`. Verify the chain with the public root CA (\`vars.RASPUTIN_ROOT_CA_PEM\` on the geekdojo org); per-asset SHA-256 in \`manifest.json\`." \
            $PRERELEASE_FLAG \
            release-out/*

      # Mirror to the PUBLIC release channel (geekdojo/rasputin-releases),
      # tag-namespaced "os-<version>". The control plane reads that public repo
      # anonymously for Check for Updates + pulls the .raucb into its bundle
      # store (source repos stay private, no token on appliances). We mirror the
      # manifest, the OTA .raucb (for Check-for-Updates), AND the .img.xz flash
      # image — end users need the .img.xz to flash a NEW node (the add-node
      # wizard links here); the manifest already names it + pins its imageSha256,
      # and it's the same signed rootfs as the public .raucb, so nothing private
      # is exposed. RASPUTIN_RELEASES is an org secret (Contents:write on
      # rasputin-releases). Idempotent (create-or-clobber) on job re-runs.
      - name: Mirror to public release channel
        env:
          GH_TOKEN: ${{ secrets.RASPUTIN_RELEASES }}
        run: |
          set -eu
          PRERELEASE_FLAG=""
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          tag="os-${{ steps.ver.outputs.version }}"
          gh release create "$tag" --repo geekdojo/rasputin-releases \
            --title "Rasputin OS ${{ steps.ver.outputs.version }}" \
            --notes "Mirrored from \`rasputin-os@${{ steps.ver.outputs.version }}\` (channel: \`${{ steps.ver.outputs.channel }}\`). Signed; per-asset SHA-256 in \`manifest.json\`." \
            $PRERELEASE_FLAG \
            release-out/manifest.json release-out/*.raucb release-out/*.img.xz \
          || gh release upload "$tag" --repo geekdojo/rasputin-releases --clobber \
            release-out/manifest.json release-out/*.raucb release-out/*.img.xz
