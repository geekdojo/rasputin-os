# CLA Assistant — asks first-time contributors to sign the geekdojo CLA
# (CLA.md) and records signatures in the shared geekdojo/cla-signatures
# store, so one signature covers all geekdojo repos.
#
# SECURITY NOTE: this workflow runs on pull_request_target but never checks
# out or executes PR code — the action only talks to the GitHub API and the
# remote signature store. Do not add a checkout of the PR head here.
#
# Requires the CLA_SIGNATURES_TOKEN secret: a PAT with write access to
# geekdojo/cla-signatures, created by the repo owner (never committed).
name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/geekdojo/rasputin-os/blob/main/CLA.md'
          branch: 'main'
          allowlist: BryceAshey,bot*
          remote-organization-name: geekdojo
          remote-repository-name: cla-signatures
