# GRUB config — N100 (amd64). RAUC's GRUB backend manages slot ORDER + the
# boot-attempts counter in grubenv. Starter config; refine when the kernel
# cmdline + dm-verity root args are finalized.

set timeout=3
load_env

# RAUC sets ORDER (e.g. "A B") and per-slot try counters in grubenv.
# Boot the first slot in ORDER whose try-count isn't exhausted.
if [ "${ORDER}" = "" ] ; then set ORDER="A B" ; fi

for SLOT in ${ORDER} ; do
	if [ "${SLOT}" = "A" ] && [ "${A_TRY}" != "3" ] ; then
		set default="rootfs.0" ; set fallback="rootfs.1"
	fi
	if [ "${SLOT}" = "B" ] && [ "${B_TRY}" != "3" ] ; then
		set default="rootfs.1" ; set fallback="rootfs.0"
	fi
done

menuentry "Rasputin OS (slot A)" --id rootfs.0 {
	# TODO(scaffold): root=PARTUUID + dm-verity args wired by post-image
	linux /boot/Image root=/dev/sda2 ro rauc.slot=A
}
menuentry "Rasputin OS (slot B)" --id rootfs.1 {
	linux /boot/Image root=/dev/sda3 ro rauc.slot=B
}
