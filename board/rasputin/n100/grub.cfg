# GRUB config — N100 (amd64). SCAFFOLD: boots slot A unconditionally.
#
# WHY no RAUC slot logic here yet: Buildroot's default EFI GRUB image only
# embeds part_gpt/fat/linux/normal/efi_gop — NOT `test` (`[`), `loadenv`
# (`load_env`), `serial`, or `terminal`. Using any of those in this cfg
# produces "can't find command" errors at boot, leaving `default` unset.
# The 2026-05-30 QEMU smoke run hit exactly this: every `[ ... ]` errored,
# `default` stayed empty, GRUB fell back to the last menuentry (slot B,
# empty by design) and the kernel panicked mounting it.
#
# Keep this cfg minimal until we add `test loadenv` (and serial/terminal if
# we want GRUB-side serial output) to BR2_TARGET_GRUB2_BUILTIN_MODULES_EFI
# in the defconfig. That work is paired with the dm-verity + initramfs +
# real RAUC integration TODOs flagged in os-images/buildroot-os.md.
#
# Until then: kernel still gets `console=ttyS0,115200` on the cmdline, so
# QEMU's -serial captures the boot fine — GRUB's own output goes through
# OVMF's serial passthrough.

set timeout=3
set default=rootfs.0

# Kernel lives at the ESP root (/bzImage; genimage copies it onto the FAT).
# Root is the squashfs A/B partition, matched by GPT PARTLABEL so the same
# image boots regardless of disk naming (QEMU virtio /dev/vda*, SATA /dev/sda*,
# or NVMe). Mounted read-only.
#
# audit=0: nothing on the image consumes the audit subsystem, and with it on,
# every docker-created iptables rule emits a type=1325 printk to every
# console= device, burying the boot output (first Mu bring-up, 2026-06-11).
# Real kernel errors still reach the console — this only disables auditd-style
# syscall/netfilter audit records, not printk.
menuentry "Rasputin OS (slot A)" --id rootfs.0 {
	linux /bzImage root=PARTLABEL=rootfs-0 rootfstype=squashfs ro rauc.slot=A audit=0 console=ttyS0,115200 console=tty1
}
menuentry "Rasputin OS (slot B)" --id rootfs.1 {
	linux /bzImage root=PARTLABEL=rootfs-1 rootfstype=squashfs ro rauc.slot=B audit=0 console=ttyS0,115200 console=tty1
}
