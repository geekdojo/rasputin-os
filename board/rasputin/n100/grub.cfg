# GRUB config — N100 (amd64). RAUC's GRUB backend manages slot ORDER + the
# boot-attempts counter in grubenv. (part_gpt/fat/linux/normal are builtin in
# Buildroot's EFI grub image, so no .mod files need to ship on the ESP.)

set timeout=3

# Serial console so the kernel + systemd log to ttyS0 — the CI QEMU smoke job
# captures this, and it matches a real debug cable on the N100.
serial --unit=0 --speed=115200
terminal_input serial console
terminal_output serial console

load_env

# RAUC sets ORDER (e.g. "A B") and per-slot try counters in grubenv.
# Boot the first slot in ORDER whose try-count isn't exhausted.
if [ "${ORDER}" = "" ] ; then set ORDER="A B" ; fi

for SLOT in ${ORDER} ; do
	if [ "${SLOT}" = "A" ] && [ "${A_TRY}" != "3" ] ; then
		set default="rootfs.0" ; set fallback="rootfs.1"
	fi
	if [ "${SLOT}" = "B" ] && [ "${B_TRY}" != "3" ] ; then
		set default="rootfs.1" ; set fallback="rootfs.0"
	fi
done

# Kernel lives at the ESP root (/bzImage; genimage copies it onto the FAT).
# Root is the squashfs A/B partition, matched by GPT PARTLABEL so the same
# image boots regardless of disk naming (QEMU virtio /dev/vda*, SATA /dev/sda*,
# or NVMe). Mounted read-only. console= duplicated for serial + VGA.
# TODO(bring-up): add dm-verity (root=/dev/mapper/…) once verity hashes are
# wired in post-image; needs a small initramfs to run veritysetup.
menuentry "Rasputin OS (slot A)" --id rootfs.0 {
	linux /bzImage root=PARTLABEL=rootfs-0 rootfstype=squashfs ro rauc.slot=A console=ttyS0,115200 console=tty1
}
menuentry "Rasputin OS (slot B)" --id rootfs.1 {
	linux /bzImage root=PARTLABEL=rootfs-1 rootfstype=squashfs ro rauc.slot=B console=ttyS0,115200 console=tty1
}
