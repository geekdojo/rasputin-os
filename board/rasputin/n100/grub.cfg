# GRUB config — N100 (amd64). RAUC A/B boot-counter with rollback.
#
# Contract (RAUC grub backend, src/bootloaders/grub.c): grubenv carries
# ORDER + per-slot <bootname>_OK / <bootname>_TRY. RAUC writes:
#   mark-good → OK=1 TRY=0      mark-bad → OK=0 TRY=0
#   activate  → OK=1 TRY=0 ORDER="<new> <old>"   (after a successful install)
# The attempt counter lives HERE: we consume one try per enabled slot and boot
# the first OK+untried slot; a slot that boots but never reaches
# rasputin-mark-good.service (panic/hang) keeps TRY=1 and is skipped next boot,
# falling through to the other slot. Slot A (rootfs.0, menuentry 0) is the
# safe fallback when nothing is selectable.
#
# Requires GRUB modules `test loadenv serial terminal` (set in the n100
# defconfig's BR2_TARGET_GRUB2_BUILTIN_MODULES_EFI) — without them this errors
# at boot. grubenv is /EFI/BOOT/grubenv on the ESP (== grub $prefix).

set timeout=3
set default=0
# `default` is GRUB's menu index (0 = slot A). `selected` is a SEPARATE flag for
# "did the loop actually pick a bootable slot?" — needed because default=0 cannot
# distinguish "slot A chosen" from "nothing chosen" (see the cleanup below).
set selected=0

# Serial for OUTPUT only. Do NOT make serial a terminal_input: the kernel logs
# to console=ttyS0 right up to a reboot, so on a warm reboot the serial buffer
# holds leftover bytes — GRUB would read them as a keypress and cancel the
# auto-boot timeout, hanging at the menu forever (caught on the bench after a
# RAUC install reboot). Input stays on the local console only.
serial --unit=0 --speed=115200
terminal_output serial console
terminal_input console

# Defaults BEFORE load_env: a missing or corrupt grubenv then degrades to
# "boot slot A", never a brick.
set ORDER="A B"
set A_OK=1
set A_TRY=0
set B_OK=0
set B_TRY=0
load_env

# Select a bootable slot (one try per enabled slot).
for SLOT in $ORDER; do
    if [ "$SLOT" = "A" ]; then
        INDEX=0
        OK=$A_OK
        TRY=$A_TRY
        A_TRY=1
    fi
    if [ "$SLOT" = "B" ]; then
        INDEX=1
        OK=$B_OK
        TRY=$B_TRY
        B_TRY=1
    fi
    if [ "$OK" -eq 1 ]; then
        if [ "$TRY" -eq 0 ]; then
            set default=$INDEX
            set selected=1
            break
        fi
    fi
done

# If nothing was selectable (all enabled slots already tried), un-consume their
# tries so they're retried next boot instead of locking to the fallback. Keyed on
# `selected`, NOT `default`: default=0 is also slot A's real index, so testing
# `default -eq 0` wrongly ran this cleanup every time slot A was chosen and
# un-consumed A's try — a hung/bad OTA on slot A then boot-looped forever instead
# of rolling back to B (its failed try never stuck). Slot B was unaffected.
if [ "$selected" -eq 0 ]; then
    if [ "$A_OK" -eq 1 ]; then
        if [ "$A_TRY" -eq 1 ]; then set A_TRY=0; fi
    fi
    if [ "$B_OK" -eq 1 ]; then
        if [ "$B_TRY" -eq 1 ]; then set B_TRY=0; fi
    fi
fi

save_env ORDER A_OK A_TRY B_OK B_TRY

# Kernel is shared on the ESP (/bzImage); root is the squashfs A/B partition by
# PARTLABEL. audit=0 keeps docker's iptables type=1325 records off the console.
menuentry "Rasputin OS (slot A)" --id rootfs.0 {
    linux /bzImage root=PARTLABEL=rootfs-0 rootfstype=squashfs ro rauc.slot=A audit=0 cgroup_enable=memory cgroup_memory=1 console=ttyS0,115200 console=tty1
}
menuentry "Rasputin OS (slot B)" --id rootfs.1 {
    linux /bzImage root=PARTLABEL=rootfs-1 rootfstype=squashfs ro rauc.slot=B audit=0 cgroup_enable=memory cgroup_memory=1 console=ttyS0,115200 console=tty1
}
