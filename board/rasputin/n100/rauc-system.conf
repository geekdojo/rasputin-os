# RAUC system config — N100 (amd64). Installed to /etc/rauc/system.conf.
#
# UEFI machine → GRUB backend. Unlike the CM5, GRUB's grubenv carries a
# real boot-attempts counter, so the amd64 nodes get bootloader-level
# rollback (RAUC decrements ORDER/try-count and marks-bad on exhaustion).
# See os-images/buildroot-os.md §3.

[system]
compatible=rasputin-n100
bootloader=grub
bundle-formats=verity

[keyring]
path=/etc/rasputin/trust/root-ca.pem

[slot.rootfs.0]
device=/dev/sda2
type=raw
bootname=A

[slot.rootfs.1]
device=/dev/sda3
type=raw
bootname=B
