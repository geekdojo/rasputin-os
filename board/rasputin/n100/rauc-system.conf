# RAUC system config — N100 (amd64). Installed to /etc/rauc/system.conf by
# post-build.sh (per-SoC).
#
# UEFI machine → GRUB backend. Unlike the CM5, GRUB's grubenv carries a
# real boot-attempts counter, so the amd64 nodes get bootloader-level
# rollback (RAUC sets <bootname>_OK/_TRY + ORDER; grub.cfg counts attempts and
# falls back). See os-images/buildroot-os.md §3.

[system]
compatible=rasputin-n100
bootloader=grub
bundle-formats=verity
# grubenv lives on the ESP (the seed FAT, mounted rw at /run/rasputin-seed).
# RAUC's grub-editenv writes it here on mark-good/mark-bad/activate; GRUB reads
# the same file at boot from its prefix (/EFI/BOOT/grubenv).
grubenv=/run/rasputin-seed/EFI/BOOT/grubenv

[keyring]
path=/etc/rasputin/trust/root-ca.pem

# Slots addressed by GPT PARTLABEL, not /dev/sdaN — the same image boots on
# NVMe (/dev/nvme0n1pN, the Mu) or SATA (/dev/sdaN) without edits.
[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs-0
type=raw
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs-1
type=raw
bootname=B
