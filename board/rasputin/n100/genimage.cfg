# N100 (amd64) partition layout — os-images/buildroot-os.md §3.
# ESP (GRUB + kernel + grubenv boot-counter) + a SEPARATE auto-mounting seed
# FAT (RASPUTIN-OS) + A/B rootfs + persistent.
#
# Why the seed is its own partition (not on the ESP): an EFI System Partition is
# HIDDEN by Windows and macOS (no drive letter / not in Finder), so a user can't
# drop rasputin-seed.env onto it via the GUI. A normal (Microsoft-basic-data)
# FAT partition auto-mounts on both. GRUB + grubenv STAY on the ESP, untouched —
# only the runtime grubenv write-mount moves (rauc-system.conf + n100 fstab
# mount the ESP by PARTLABEL "esp" at /run/rasputin-esp). Everything is addressed
# by label / partlabel, so inserting the seed partition is number-safe.

image efi.vfat {
	vfat {
		# Boot-only ESP: GRUB + kernel + grubenv. Hidden from the GUI (EFI
		# System type) — which is exactly why the seed is a separate partition
		# below. Deliberately NOT labeled RASPUTIN-OS (that's the seed volume
		# now); the ESP is reached by PARTLABEL "esp" (grubenv mount) and by the
		# EFI firmware, never by this FS label.
		label = "RASPUTINEFI"
		# `file <dest> { image = <src-relative-to-inputpath> }` is the robust
		# genimage idiom (matches Buildroot's board/pc/genimage-efi.cfg).
		file EFI {
			# Buildroot's grub2 tree: efi-part/EFI/BOOT/{bootx64.efi,grub.cfg}.
			# post-image.sh drops our grub.cfg + inits grubenv here.
			image = "efi-part/EFI"
		}
		file bzImage {
			# GRUB loads the kernel from the ESP root (/bzImage).
			image = "bzImage"
		}
	}
	size = 256M
}

# The provisioning seed on its OWN FAT partition so it auto-mounts in Explorer /
# Finder (an ESP does not). Microsoft-basic-data type + FAT + label RASPUTIN-OS
# (the same label the rpi selector FAT carries, so one seed mount unit serves
# both boards). The separate firewall image keeps RASPUTIN-FW.
image seed.vfat {
	vfat {
		label = "RASPUTIN-OS"
		file rasputin-seed.env {
			image = "rasputin-seed.env"
		}
	}
	size = 64M
}

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition esp {
		partition-type-uuid = c12a7328-f81f-11d2-ba4b-00a0c93ec93b  # EFI System
		bootable = "true"
		image = "efi.vfat"
	}

	partition seed {
		# Microsoft basic data — a plain data partition Windows assigns a drive
		# letter to (and macOS mounts). NOT EFI System, so it isn't hidden.
		partition-type-uuid = ebd0a0a2-b9e5-4433-87c0-68b6b72699c7
		image = "seed.vfat"
	}

	partition rootfs-0 {
		partition-type-uuid = 4f68bce3-e8cd-4db1-96e7-fbcaf984b709  # x86-64 root
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type-uuid = 4f68bce3-e8cd-4db1-96e7-fbcaf984b709
		# Pre-populate slot B with the same rootfs at flash so the box has a
		# working fallback before its first OTA (grubenv ships both slots OK).
		# The first update overwrites B and activates it; A stays as the
		# rollback target. (README "Populate slot B at flash time.")
		image = "rootfs.squashfs"
		size = 1G
	}

	partition persistent {
		# MUST stay last: rasputin-growpart grows it into the disk tail.
		partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4  # Linux data
		image = "persistent.ext4"
		size = 512M
	}
}
