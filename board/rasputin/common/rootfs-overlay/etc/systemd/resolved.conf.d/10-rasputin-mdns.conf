# mDNS responder — the appliance must answer <hostname>.local on any LAN so
# the first-run browser flow (https://rasputin.local, WebAuthn RP ID
# "rasputin.local") works with zero DNS infrastructure.
#
# Buildroot 2025.02 builds systemd 256.7 with the upstream meson default
# default-mdns=yes, so this drop-in is technically redundant — it exists to
# make the dependency EXPLICIT (a future Buildroot bump or a -Ddefault-mdns
# change upstream must not silently kill first-run discovery).
#
# The global switch alone does nothing: resolved only responds on links where
# networkd opted in per-link (MulticastDNS=yes in 20-wired.network, which
# defaults to false per systemd.network(5)).
[Resolve]
MulticastDNS=yes
