# Rasputin: numeric NTP fallbacks.
#
# A no-RTC node (e.g. Pi 5) boots to a bogus clock and, until NTP corrects it,
# mints an "expired" TLS leaf (see provisioning.md "Time sync"). timesyncd's
# compiled-in fallback servers are HOSTNAMES, so on a network with broken or
# absent DNS it can never resolve them and the clock stays wrong. These are
# ANYCAST IPs (Cloudflare, Google) — no DNS needed — so time sync works even on
# a DNS-less LAN.
#
# FallbackNTP (NOT NTP=) is used ONLY when neither a per-interface DHCP NTP
# server (option 42) nor an NTP= server is known, so a homelab-local NTP always
# takes precedence:
#   DHCP option 42  >  NTP= (RASPUTIN_NTP_SERVER seed)  >  FallbackNTP= (this).
[Time]
FallbackNTP=162.159.200.123 162.159.200.1 216.239.35.0 216.239.35.4
