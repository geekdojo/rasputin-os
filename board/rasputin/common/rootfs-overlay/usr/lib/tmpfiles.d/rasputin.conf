# Persistent-partition directories that must exist before their consumers
# start. /var/lib/docker and /var/lib/containerd are baked-in symlinks onto
# the persistent partition (read-only squashfs rootfs); neither daemon will
# create the target of a dangling symlink itself — dockerd fails with
# "mkdir /var/lib/docker: file exists" (dev.4 bring-up).
# tmpfiles-setup orders after local-fs.target, i.e. after the persistent
# mount (nofail: if that mount failed these lines fail too, harmlessly —
# the daemons are gated by RequiresMountsFor drop-ins anyway).
d /var/lib/rasputin/docker     0710 root root -
d /var/lib/rasputin/containerd 0711 root root -
# tailscaled state: /var/lib/tailscale is a baked-in symlink onto the
# persistent partition (same as docker above). 0700 — tailscaled keeps node
# keys here.
d /var/lib/rasputin/tailscale  0700 root root -
# Mesh CA dir: holds the per-installation Mesh CA bundle (tailscaled-ca.pem)
# that the agent writes on enrollment, on the persistent partition so it
# survives reboots. tailscaled reads it via SSL_CERT_FILE (drop-in).
d /var/lib/rasputin/mesh       0755 root root -
# dropbear host keys: persistent so the SSH host identity is stable across
# reboots + A/B updates (read-only squashfs rootfs). dropbear.service also
# mkdir's this in ExecStartPre; declared here for ordering + clarity.
d /var/lib/rasputin/dropbear   0700 root root -

# Bridge the baked bundle-signing root CA into the api's writable trust
# dir. The image bakes the PUBLIC root at /etc/rasputin/trust/root-ca.pem
# (CI injects vars.RASPUTIN_ROOT_CA_PEM; RAUC's keyring reads it there
# directly), but the api's RASPUTIN_TRUST_DIR defaults to
# /var/lib/rasputin/trust — the persistent partition, because that's also
# where it must WRITE mesh-ca.{key,pem}. Without this line the setup
# wizard's "Verify PKI trust" step reads amber on a factory image (first
# Mu wizard run, 2026-06-12). Plain L (not L+): an operator-provided real
# file at the target wins over the baked root.
d /var/lib/rasputin/trust 0755 root root -
L /var/lib/rasputin/trust/root-ca.pem - - - - /etc/rasputin/trust/root-ca.pem
