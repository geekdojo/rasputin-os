# rpi SKU (arm64: Pi 4 / Pi 5 / CM5) partition layout — os-images/buildroot-os.md §3.
# TWO Pi-firmware boot FATs (boot-a + boot-b) + A/B rootfs + persistent.
#
# The boot FATs are PRE-BUILT by board/rasputin/common/post-image.sh with mtools
# so the firmware blobs land at the FAT root (genimage's vfat `files` preserves
# subdir paths, which the Pi firmware can't read). genimage just embeds the
# pre-built `boot-a.vfat`/`boot-b.vfat` here — `image = "…"` references a file
# already in the input dir (same way "rootfs.squashfs" is referenced).
#
# IMPORTANT: genimage's parser does NOT accept `#` comments inside `{ ... }`
# brace blocks — it parses the comment text as a value token. Keep notes in
# this header, outside the braces.
#
# A/B is the CANONICAL Pi tryboot mechanism — `autoboot.txt` `boot_partition`
# switching, processed by the EEPROM BOOTLOADER stage (portable across Pi 4 +
# Pi 5; the earlier single-FAT `[tryboot]` config.txt cmdline-swap was honored
# only by the Pi 5's unified firmware, NOT the Pi 4's start4.elf — bench
# 2026-06-27). PARTITION ORDER IS LOAD-BEARING: `boot-a` MUST be partition 1 and
# `boot-b` partition 2, because autoboot.txt selects them by NUMBER
# (`boot_partition=1`/`=2`), not by name:
#   - boot-a (p1, label RASPUTIN-FW): the firmware reads autoboot.txt from here
#     (first FAT); also carries slot A's boot env (config.txt + cmdline.txt
#     rooting rootfs-0) + the seed. The RAUC backend edits autoboot.txt here.
#   - boot-b (p2, label RASPUTIN-B): slot B's boot env (cmdline.txt roots
#     rootfs-1). No autoboot.txt (only p1's is read) and no seed.
# Each boot FAT statically roots its OWN slot, so NO config.txt conditional is
# involved. The kernel set is NOT OTA'd (RAUC updates only the rootfs, like the
# n100) — the boot FATs are static after flash.
#
# PARTLABELs (boot-a / boot-b / rootfs-0 / rootfs-1 / persistent) keep everything
# medium-agnostic: cmdline.txt roots at PARTLABEL=rootfs-N, firstboot mounts
# PARTLABEL=persistent, RAUC slots use /dev/disk/by-partlabel/rootfs-N — same
# image boots microSD (mmcblk) / USB-SSD (sda) / NVMe (nvme0n1) unchanged. Both
# rootfs slots ship the same squashfs at flash so there's a working fallback
# before the first OTA.

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition boot-a {
		partition-type-uuid = F
		bootable = "true"
		image = "boot-a.vfat"
	}

	partition boot-b {
		partition-type-uuid = F
		image = "boot-b.vfat"
	}

	partition rootfs-0 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		image = "rootfs.squashfs"
		size = 1G
	}

	partition persistent {
		partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
		size = 512M
	}
}
