# rpi SKU (arm64: Pi 4 / Pi 5 / CM5) partition layout — os-images/buildroot-os.md §3.
# Pi-firmware boot FAT (label RASPUTIN-FW; carries config.txt + kernel + DTBs +
# firmware + rasputin-seed.env) + A/B rootfs + persistent.
#
# The boot FAT (boot.vfat) is PRE-BUILT by board/rasputin/common/post-image.sh
# with mtools so the firmware blobs land at the FAT root (genimage's vfat `files`
# preserves subdir paths, which the Pi firmware can't read). genimage just embeds
# the pre-built boot.vfat here — there is no `image boot.vfat { vfat { … } }`
# block; `image = "boot.vfat"` references the file already in the input dir
# (same way "rootfs.squashfs" is referenced).
#
# IMPORTANT: genimage's parser does NOT accept `#` comments inside `{ ... }`
# brace blocks — it parses the comment text as a value token. Keep notes in
# this header, outside the braces.
#
# Partition NAMES below become the GPT PARTLABELs (firmware / rootfs-0 /
# rootfs-1 / persistent), which is how everything addresses them medium-
# agnostically: cmdline.txt roots at PARTLABEL=rootfs-0, firstboot mounts
# PARTLABEL=persistent, and RAUC slots use /dev/disk/by-partlabel/rootfs-N — so
# the same image boots from microSD (mmcblk), USB-SSD (sda), or NVMe (nvme0n1)
# with no edits.
#
# BRING-UP: single boot FAT + single active slot (rootfs-0) for the first Pi 5
# boot. The tryboot A/B (a second FAT boot partition + autoboot.txt) lands after
# basic boot is confirmed.

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition firmware {
		partition-type-uuid = F
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs-0 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		size = 1G
	}

	partition persistent {
		partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
		size = 512M
	}
}
