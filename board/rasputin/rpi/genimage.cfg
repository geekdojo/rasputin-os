# rpi SKU (arm64: Pi 4 / Pi 5 / CM5) partition layout — os-images/buildroot-os.md §3.
# CANONICAL Pi tryboot A/B (Rtone/Bootlin/HAOS): a SEPARATE selector partition +
# two firmware/boot slots + A/B rootfs + persistent.
#
# The FATs are PRE-BUILT by board/rasputin/common/post-image.sh with mtools so
# the firmware blobs land at the FAT root (genimage's vfat `files` preserves
# subdir paths, which the Pi firmware can't read). genimage just embeds the
# pre-built `selector.vfat`/`boot-a.vfat`/`boot-b.vfat` here.
#
# IMPORTANT: genimage's parser does NOT accept `#` comments inside `{ ... }`
# brace blocks. Keep notes in this header, outside the braces.
#
# A/B is the CANONICAL `autoboot.txt` `boot_partition` switch at the EEPROM
# BOOTLOADER stage (portable Pi 4 + Pi 5). PARTITION ORDER IS LOAD-BEARING —
# autoboot.txt selects boot slots by NUMBER (`boot_partition=2`/`=3`):
#   - selector (p1, label RASPUTIN-FW): holds ONLY autoboot.txt (the firmware
#     reads it from the first FAT) + the provisioning seed + the RAUC backend's
#     slot state. It is deliberately NOT bootable on its own (no kernel/config),
#     which FORCES the firmware to honor boot_partition and redirect to p2/p3.
#     Mounted rw at /run/rasputin-seed; the backend edits autoboot.txt here.
#   - boot-a (p2, label RASPUTIN-A): slot A's COMPLETE boot env — firmware
#     (start4.elf etc.) + config.txt + both kernels + DTBs + cmdline.txt rooting
#     rootfs-0. `boot_partition=2`.
#   - boot-b (p3, label RASPUTIN-B): same, cmdline.txt rooting rootfs-1.
#     `boot_partition=3`.
# On the Pi 4 the EEPROM loads start4.elf FROM boot_partition (p2/p3), so the
# kernel is right beside it — this is the fix for the earlier "kernel not found"
# (7-flash) failure of the self-referential single-selector layout. Each boot
# slot has its OWN static cmdline.txt (NO config.txt `[boot_partition=N]`
# conditional — start4.elf ignores that class of filter, bench 2026-06-27).
# Kernels are NOT OTA'd (RAUC updates only the rootfs, like the n100).
#
# PARTLABELs keep everything medium-agnostic: cmdline.txt roots PARTLABEL=rootfs-N,
# firstboot mounts PARTLABEL=persistent, RAUC slots use by-partlabel/rootfs-N —
# same image boots microSD / USB-SSD / NVMe unchanged. Both rootfs slots ship the
# same squashfs at flash so there's a working fallback before the first OTA.

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition selector {
		partition-type-uuid = F
		bootable = "true"
		image = "selector.vfat"
	}

	partition boot-a {
		partition-type-uuid = F
		image = "boot-a.vfat"
	}

	partition boot-b {
		partition-type-uuid = F
		image = "boot-b.vfat"
	}

	partition rootfs-0 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		image = "rootfs.squashfs"
		size = 1G
	}

	partition persistent {
		partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
		size = 512M
	}
}
