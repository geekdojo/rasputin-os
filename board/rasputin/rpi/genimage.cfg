# rpi SKU (arm64: Pi 4 / Pi 5 / CM5) partition layout — os-images/buildroot-os.md §3.
#
# MBR (msdos) partition table — NOT GPT. The Pi firmware's autoboot.txt
# `boot_partition` A/B switch is an UNRESOLVED firmware bug on GPT for the Pi 4
# (rpi-eeprom#654: reads autoboot.txt, redirects to boot_partition, then "kernel
# not found" / 7 LED flashes — our exact bench symptom 2026-06-27). MBR is the
# documented-reliable scheme for Pi tryboot A/B (forum-proven layout, Rtone). The
# Pi 5 honors MBR too, so ONE layout serves both boards. (The n100 stays GPT —
# UEFI requires it; the two arches diverge only at this irreducible boot layer.)
#
# The FATs are PRE-BUILT by board/rasputin/common/post-image.sh with mtools.
# genimage embeds them via `image = "…"`.
#
# IMPORTANT: genimage's parser does NOT accept `#` comments inside `{ … }` brace
# blocks. Keep notes in this header.
#
# CANONICAL Pi tryboot A/B = `autoboot.txt` `boot_partition` switch at the EEPROM
# stage. PARTITION ORDER IS LOAD-BEARING — autoboot.txt selects boot slots by
# PRIMARY partition NUMBER (`boot_partition=2`/`=3`):
#   p1 selector  (FAT, primary, bootable): ONLY autoboot.txt + seed + RAUC slot
#                state. No kernel/config, so the firmware MUST honor boot_partition
#                and redirect. Mounted rw at /run/rasputin-seed (FS label RASPUTIN-OS).
#   p2 boot-a    (FAT, primary): slot A's COMPLETE boot env — start4.elf + config.txt
#                + both kernels + DTBs + cmdline.txt rooting rootfs-0. boot_partition=2.
#   p3 boot-b    (FAT, primary): same, cmdline.txt rooting rootfs-1. boot_partition=3.
#   p4 extended container (auto) holding the logicals:
#   p5 rootfs-0  (Linux, logical)   p6 rootfs-1 (Linux, logical)   p7 persistent (logical)
# On the Pi 4 the EEPROM loads start4.elf FROM boot_partition (p2/p3), kernel
# beside it. Each boot slot has its OWN static cmdline.txt.
#
# ADDRESSING: MBR has no PARTLABEL, so everything uses PARTUUID = the
# disk-signature (below) + the partition number in hex:
#   rootfs-0 = 52415350-05   rootfs-1 = 52415350-06   persistent = 52415350-07
# cmdline.txt roots root=PARTUUID=…-05/-06; RAUC slots use by-partuuid; the rpi
# fstab mounts persistent by PARTUUID. The seed FAT is found by FS label
# (RASPUTIN-OS), unaffected by the table type. disk-signature is FIXED so the
# PARTUUIDs are stable across every flashed card + medium-agnostic (resolves on
# microSD/USB/NVMe alike). Both rootfs slots ship the same squashfs at flash.

image disk.img {
	hdimage {
		partition-table-type = "mbr"
		disk-signature = 0x52415350
	}

	partition selector {
		partition-type = 0xc
		bootable = "true"
		image = "selector.vfat"
	}

	partition boot-a {
		partition-type = 0xc
		image = "boot-a.vfat"
	}

	partition boot-b {
		partition-type = 0xc
		image = "boot-b.vfat"
	}

	partition rootfs-0 {
		partition-type = 0x83
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type = 0x83
		image = "rootfs.squashfs"
		size = 1G
	}

	partition persistent {
		partition-type = 0x83
		image = "persistent.ext4"
		size = 512M
	}
}
