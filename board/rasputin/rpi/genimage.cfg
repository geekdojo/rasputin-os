# CM5 (arm64) partition layout — os-images/buildroot-os.md §3.
# FAT firmware/boot (carries the rasputin-seed.env) + A/B rootfs + persistent.
#
# IMPORTANT: genimage's parser does NOT accept `#` comments inside `{ ... }`
# brace blocks — it tries to parse the comment text as a value token. Keep
# any notes about the file lists OUTSIDE the braces, like this header.
#
# Hardware bring-up will add to the boot FAT below: "Image" (kernel), the
# CM5 carrier DTB (bcm2712-rpi-cm5-cb.dtb), and the Pi firmware blob set
# (start4.elf, fixup4.dat, …) — once the RPi firmware package set is
# pinned in the defconfig.

image boot.vfat {
	vfat {
		label = "RASPUTIN-FW"
		files = {
			"config.txt",
			"autoboot.txt",
			"rasputin-seed.env"
		}
	}
	size = 256M
}

image disk.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition firmware {
		partition-type-uuid = F  # EFI-system-ish / FAT for Pi firmware
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs-0 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae  # arm64 root
		image = "rootfs.squashfs"
		size = 1G
	}

	partition rootfs-1 {
		partition-type-uuid = b921b045-1df0-41c3-af44-4c6f280d3fae
		# second slot — same size; filled by RAUC on first OTA, empty at flash
		size = 1G
	}

	partition persistent {
		partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4  # Linux data
		# grows to fill the medium on first boot
		size = 512M
	}
}
