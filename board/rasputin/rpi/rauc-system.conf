# RAUC system config — rpi SKU (arm64: Pi 4 / Pi 5 / CM5). Installed to
# /etc/rauc/system.conf.
#
# The Pi has NO official RAUC bootloader backend. We use the `custom`
# backend with hook scripts wrapping the Pi firmware's autoboot.txt +
# one-shot tryboot flag (Rtone/Bootlin approach). CRITICAL: this backend
# cannot count boot attempts and the firmware will not auto-fallback —
# hence the systemd watchdog + app health-check defense-in-depth.
# See os-images/buildroot-os.md §3 and HAOS PR #3842.

[system]
compatible=rasputin-rpi-arm64
bootloader=custom
# verity bundles: runtime dm-verity integrity (control-plane/updates.md §2)
bundle-formats=verity

[handlers]
# TODO(scaffold): ship these hook scripts (get-primary/set-primary/get-state
# parsing autoboot.txt + arming tryboot via vcmailbox).
bootloader-custom-backend=/usr/lib/rauc/rpi-tryboot-backend.sh

[keyring]
path=/etc/rasputin/trust/root-ca.pem

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=raw
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=raw
bootname=B
