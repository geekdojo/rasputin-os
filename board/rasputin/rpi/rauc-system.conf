# RAUC system config — rpi SKU (arm64: Pi 4 / Pi 5 / CM5). Installed to
# /etc/rauc/system.conf.
#
# The Pi has NO official RAUC bootloader backend. We use the `custom` backend
# with a hook script driving the firmware's autoboot.txt `boot_partition`
# switching + one-shot tryboot flag (the canonical Rtone/Bootlin/HAOS approach).
# The image has TWO boot FATs (boot-a=p1, boot-b=p2), each statically rooting
# its slot; autoboot.txt's [all] boot_partition selects the committed slot and
# [tryboot] the candidate. The one-shot tryboot IS the rollback: a trial that
# never reaches mark-good reverts on the next normal boot. This runs at the
# EEPROM-bootloader stage (portable Pi 4 + Pi 5) — the earlier single-FAT
# config.txt `[tryboot]` cmdline swap was Pi-5-only (bench 2026-06-27). RAUC
# updates only the rootfs (kernels are not OTA'd), like the n100. CRITICAL:
# unlike GRUB this backend cannot count boot attempts and the firmware will not
# auto-fallback a COMMITTED slot — hence the systemd watchdog + app health-check
# + the reconcile/mark-bad path as defense-in-depth. See os-images/buildroot-os.md §3.

[system]
compatible=rasputin-rpi-arm64
bootloader=custom
# verity bundles: runtime dm-verity integrity (control-plane/updates.md §2)
bundle-formats=verity
# RAUC mounts the bundle here during install. The default (/mnt/rauc) is on the
# read-only squashfs rootfs, so `rauc install` fails ("Read-only file system").
# Point it at tmpfs — mirrors the n100. (Bug: the rpi conf was missing this.)
mountprefix=/run/rauc

[handlers]
# RAUC custom-backend contract (get/set-primary, get/set-state): the script
# parses + rewrites autoboot.txt's [all]/[tryboot] boot_partition on boot-a and
# tracks a pending-trial marker. The trial reboot itself is `reboot "0 tryboot"`.
bootloader-custom-backend=/usr/lib/rauc/rpi-tryboot-backend.sh

[keyring]
path=/etc/rasputin/trust/root-ca.pem

# Slots addressed by GPT PARTLABEL, not /dev/mmcblk0pN — so the same image
# boots medium-agnostically: microSD (/dev/mmcblk0pN), USB-SSD (/dev/sdaN), or
# NVMe (/dev/nvme0n1pN, the Pi 5 SSD HAT) with no edits. Mirrors the N100.
[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs-0
type=raw
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs-1
type=raw
bootname=B
